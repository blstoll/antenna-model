name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a PR push doesn't pile up jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # libtest runs each test on a worker thread with a ~2 MiB default stack. The
  # calibrate 3D→4D correction-surface round-trip evaluation is stack-hungry and
  # overflows that on the Linux debug build (it passes on macOS). Give test
  # threads more headroom. (Making the evaluation iterative is roadmap unit D3.)
  RUST_MIN_STACK: "16777216"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-test:
    name: clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  audit:
    name: cargo audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true  # advisories are tracked, not gating, until the allowlist policy is set
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit
