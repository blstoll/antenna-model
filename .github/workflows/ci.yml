name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a PR push doesn't pile up jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-test:
    name: clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenBLAS (calibrate uses ndarray-linalg openblas-system)
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev gfortran pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  audit:
    name: cargo audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true  # advisories are tracked, not gating, until the allowlist policy is set
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit
