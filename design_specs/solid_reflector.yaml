# Design Specifications for Solid Reflector Antenna (13m)
#
# This file provides initial parameter estimates for boresight calibration.
# Solid reflector (not mesh), suitable for high-frequency operation.

antenna_id: "antenna_3"
antenna_name: "13m DSN-class Antenna - Ka-Band"

# Reflector geometry
reflector:
  diameter_m: 13.0
  focal_length_m: 5.2  # f/D = 0.4 (typical for DSN)
  surface_rms_mm: 0.5  # Very high quality surface

# Feed configurations
feeds:
  - feed_id: "x_band"
    name: "X-Band Downlink"
    position: [0.0, 0.0, 0.0]
    q_factor: 10.0
    phase_center_offset_m: 0.0
    frequency_range: [7100.0, 8500.0]

  - feed_id: "ka_band_downlink"
    name: "Ka-Band Downlink"
    position: [0.0, 0.15, 0.0]
    q_factor: 12.0  # Very tight pattern for large dish
    phase_center_offset_m: 0.02
    frequency_range: [31800.0, 32300.0]  # Ka-band downlink

  - feed_id: "ka_band_uplink"
    name: "Ka-Band Uplink"
    position: [0.15, 0.0, 0.0]
    q_factor: 12.0
    phase_center_offset_m: 0.02
    frequency_range: [34200.0, 34700.0]  # Ka-band uplink

# No mesh for solid reflector (omit mesh section)
