# Design Specifications for Small Ground Station (3.7m)
#
# This file provides initial parameter estimates for boresight calibration.
# Values are based on manufacturer specifications and engineering drawings.

antenna_id: "antenna_1"
antenna_name: "3.7m Ground Station - X-Band"

# Reflector geometry
reflector:
  diameter_m: 3.7
  focal_length_m: 1.85
  surface_rms_mm: 1.5  # Estimated surface quality

# Feed configurations
feeds:
  - feed_id: "x_band"
    name: "X-Band Primary Feed"
    position: [0.0, 0.0, 0.0]  # At focal point
    q_factor: 8.0  # Typical for horn feed with 10 dB edge taper
    phase_center_offset_m: 0.0
    frequency_range: [7100.0, 8500.0]  # X-band: 7.1-8.5 GHz

  - feed_id: "s_band"
    name: "S-Band Secondary Feed"
    position: [0.05, 0.0, 0.0]  # Slightly off-axis
    q_factor: 7.0  # Lower q-factor for broader pattern
    phase_center_offset_m: 0.0
    frequency_range: [2000.0, 2300.0]  # S-band: 2.0-2.3 GHz

# Mesh reflector parameters
mesh:
  mesh_spacing_mm: 5.0  # 5mm hole size
  wire_diameter_mm: 0.5  # 0.5mm wire diameter
