# Default values for antenna-model Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas
replicaCount: 2

image:
  repository: antenna-model
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

# Optional LoadBalancer service
loadBalancer:
  enabled: false
  annotations: {}
  # loadBalancerIP: ""

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: antenna-model.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: antenna-model-tls
  #    hosts:
  #      - antenna-model.example.com

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - antenna-model
        topologyKey: kubernetes.io/hostname

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

# Environment variables
env:
  RUST_LOG: "info"
  SERVICE_HOST: "0.0.0.0"
  SERVICE_PORT: "3000"

# Service configuration
config:
  service:
    host: "0.0.0.0"
    port: 3000
    request_timeout_seconds: 30
    max_request_body_size_bytes: 10485760  # 10 MB

  logging:
    level: "info"
    format: "json"
    request_logging: true

  data:
    calibration_data_dir: "/app/calibration_data"
    antennas_config_file: "/app/calibration_data/antennas.yaml"

  computation:
    default_integration_mode: "default"  # fast, default, high_accuracy
    parallel_batch_threshold: 5
    max_batch_size: 1000

  health:
    enabled: true
    detailed_status: true

# Calibration data configuration
# In production, this should be loaded from persistent storage or object storage
calibrationData:
  # Use existing ConfigMap
  useExistingConfigMap: false
  existingConfigMapName: ""
  # Or provide inline data (not recommended for production)
  antennas: []

# Persistent volume for calibration data (recommended for production)
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadOnlyMany
  size: 1Gi
  mountPath: /app/calibration_data

# Monitoring and observability
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

# Network policies
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
      - namespaceSelector: {}
  egress:
    - to:
      - namespaceSelector: {}

# Environment-specific overrides
environments:
  dev:
    replicaCount: 1
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    autoscaling:
      enabled: false
    config:
      logging:
        level: "debug"

  staging:
    replicaCount: 2
    config:
      logging:
        level: "debug"

  production:
    replicaCount: 3
    autoscaling:
      minReplicas: 3
      maxReplicas: 20
    podDisruptionBudget:
      minAvailable: 2
    config:
      logging:
        level: "info"
