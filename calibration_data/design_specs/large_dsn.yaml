# Design Specifications for Large Deep Space Network Antenna
# 34m high-precision antenna (DSN-70m class scaled down)

antenna:
  name: "Deep Space Network 34m"
  class: "large_dsn"

  reflector:
    diameter_m: 34.0
    focal_length_m: 13.6
    f_over_d_ratio: 0.4

    # Ultra-high precision for deep space science
    # Holographic measurement data available
    surface_rms_mm: 0.25

  feeds:
    # S-Band (command and telemetry)
    - id: "s_band"
      name: "S-Band Feed"
      position: [0.0, 0.0, 0.0]
      q_factor: 8.5
      phase_center_offset_m: 0.02
      frequency_range: [2200.0, 2300.0]

    # X-Band (primary science)
    - id: "x_band"
      name: "X-Band Feed"
      position: [0.15, 0.0, 0.0]
      q_factor: 9.5
      phase_center_offset_m: 0.015
      frequency_range: [8400.0, 8500.0]

    # Ka-Band (high data rate science)
    - id: "ka_band"
      name: "Ka-Band Feed"
      position: [0.0, 0.15, 0.0]
      q_factor: 11.0
      phase_center_offset_m: 0.008
      frequency_range: [31800.0, 32300.0]

  mesh: null  # Solid aluminum panels

tuning_bounds:
  # Very tight bounds - high confidence in design values
  surface_rms_mm: [0.15, 0.40]
  q_factor: [8.0, 12.0]

notes: |
  Large DSN antenna with holographic surface measurements.
  Surface RMS from in-situ holography (0.25mm validated).
  Multi-feed configuration for simultaneous multi-band operation.
  Recommend full azimuth/elevation calibration grid for science operations.
  Expected on-axis gain: S-band ~52 dBi, X-band ~68 dBi, Ka-band ~77 dBi.
