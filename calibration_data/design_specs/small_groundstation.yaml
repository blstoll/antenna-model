# Design Specifications for Small Ground Station Antenna
# 3.7m Cassegrain antenna with mesh reflector

antenna:
  # Basic identification
  name: "Small Ground Station 3.7m"
  class: "small_groundstation"

  # Reflector geometry
  reflector:
    diameter_m: 3.7
    focal_length_m: 1.85
    f_over_d_ratio: 0.5

    # Surface quality (initial estimate)
    # Typical for commercial ground station: 1-2mm RMS
    surface_rms_mm: 1.5

  # Feed configurations
  feeds:
    # S-Band feed (communications)
    - id: "s_band_feed"
      name: "S-Band Primary Feed"

      # Position relative to focal point (x, y, z in meters)
      # At focal point for primary feed
      position: [0.0, 0.0, 0.0]

      # Feed pattern q-factor for cos^q illumination
      # Typical range: 6-12 (higher = more directive)
      # Horn feed typical: 7-9
      q_factor: 8.0

      # Phase center offset from feed aperture (meters)
      phase_center_offset_m: 0.0

      # Operating frequency range (MHz)
      frequency_range: [2000.0, 2300.0]

    # X-Band feed (telemetry, commanding)
    - id: "x_band_feed"
      name: "X-Band Secondary Feed"

      # Slightly offset from focal point for dual-feed system
      position: [0.05, 0.0, 0.0]

      q_factor: 8.5
      phase_center_offset_m: 0.0
      frequency_range: [7100.0, 8500.0]

  # Mesh reflector parameters
  mesh:
    # Mesh hole size (millimeters)
    # Typical: 3-10mm depending on frequency
    mesh_spacing_mm: 5.0

    # Wire diameter (millimeters)
    # Typical: 0.3-1.0mm
    wire_diameter_mm: 0.5

# Parameter tuning bounds (for calibration optimizer)
# These constrain the differential evolution search
tuning_bounds:
  # Surface RMS can vary ±50% from estimate
  surface_rms_mm: [0.75, 3.0]

  # q-factor typical range for horn feeds
  q_factor: [6.0, 12.0]

  # Mesh parameters ±40% variation
  mesh_spacing_mm: [3.0, 8.0]
  wire_diameter_mm: [0.3, 0.8]

# Notes for calibration engineer
notes: |
  Design specifications from vendor datasheet (AcmeSat Model GS-3700).
  Surface RMS estimated from visual inspection - mesh appears in good condition.
  Feed q-factors are nominal values for standard horn feeds.
  Recommend boresight calibration for parameter validation.
