# Design specs example for the `calibrate --design-specs` boresight-calibration workflow.
#
# Schema: DesignSpecs (calibrate/src/design_specs_loader.rs) — a FLAT antenna_id / feeds[].feed_id
# layout. This is a standalone INPUT to the calibration tool; it is NOT the service's
# calibration_data/antennas.yaml format (which uses inline `design_specs:` blocks). Kept valid by
# design_specs_loader.rs::tests::example_design_specs_file_loads.
#
# Usage:
#   cargo run --release --bin calibrate -- \
#     --input measurements/gs_3.7m_boresight.csv \
#     --output calibration_data/gs_3.7m_boresight.bin \
#     --antenna-id gs_3.7m --feed-id x_band_feed \
#     --calibration-mode boresight \
#     --design-specs calibration_data/design_specs/small_groundstation.yaml

antenna_id: "gs_3.7m"
antenna_name: "Small Ground Station 3.7m - X/S-Band"

reflector:
  diameter_m: 3.7
  focal_length_m: 1.85 # f/D = 0.5
  surface_rms_mm: 1.5

feeds:
  - feed_id: "s_band_feed"
    name: "S-Band Primary Feed"
    position: [0.0, 0.0, 0.0]
    # cos^q is the FIELD pattern here, so q~2 gives a ~-11 dB edge taper at f/D 0.5
    # (see illumination.rs / q_factor_from_taper); the "6-12 horn" rule does NOT apply.
    q_factor: 2.04
    phase_center_offset_m: 0.0
    frequency_range: [2000.0, 2300.0]

  - feed_id: "x_band_feed"
    name: "X-Band Secondary Feed"
    position: [0.05, 0.0, 0.0]
    q_factor: 2.04
    phase_center_offset_m: 0.0
    frequency_range: [7100.0, 8500.0]

mesh:
  mesh_spacing_mm: 5.0
  wire_diameter_mm: 0.5
