# Design Specifications for Medium Deep Space Network Antenna
# 13m high-precision antenna with solid reflector

antenna:
  name: "Deep Space Network 13m"
  class: "medium_dsn"

  reflector:
    diameter_m: 13.0
    focal_length_m: 5.2
    f_over_d_ratio: 0.4

    # High-precision surface for deep space applications
    # Target: <0.5mm RMS for Ka-band operation
    surface_rms_mm: 0.4

  feeds:
    # X-Band downlink (primary)
    - id: "x_band_downlink"
      name: "X-Band Downlink Feed"
      position: [0.0, 0.0, 0.0]
      q_factor: 9.0  # Higher directivity for deep space
      phase_center_offset_m: 0.01
      frequency_range: [7145.0, 7235.0]

    # X-Band uplink
    - id: "x_band_uplink"
      name: "X-Band Uplink Feed"
      position: [0.08, 0.0, 0.0]
      q_factor: 9.0
      phase_center_offset_m: 0.01
      frequency_range: [7145.0, 7235.0]

    # Ka-Band downlink (high data rate)
    - id: "ka_band_downlink"
      name: "Ka-Band Downlink Feed"
      position: [0.0, 0.08, 0.0]
      q_factor: 10.0  # Even higher directivity at Ka-band
      phase_center_offset_m: 0.005
      frequency_range: [25500.0, 27000.0]

  # No mesh - solid reflector
  mesh: null

tuning_bounds:
  # Tight bounds for high-precision antenna
  surface_rms_mm: [0.2, 0.8]
  q_factor: [7.5, 11.0]

notes: |
  DSN-class antenna with precision surface.
  Surface RMS from interferometric measurements during construction.
  Feed parameters from vendor specifications (NASA/JPL standard feeds).
  Full calibration required for science-grade operations.
